<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Costa de Bakio con San Juan de Gaztelugatxe (imagen de muestra)">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a6f5a"/>
      <stop offset="0.55" stop-color="#12856a"/>
      <stop offset="1" stop-color="#1f9c7d"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e5c4a"/>
      <stop offset="1" stop-color="#0a4a3c"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e2ad"/>
      <stop offset="1" stop-color="#e9d9a8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.34" r="0.5">
      <stop offset="0" stop-color="#f6ecc6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f6ecc6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <circle cx="1150" cy="300" r="74" fill="url(#sun)" opacity="0.9"/>

  <!-- lejanas colinas -->
  <path d="M0 540 Q 260 470 520 520 T 1040 505 T 1600 520 V900 H0 Z" fill="#0f6b56" opacity="0.6"/>
  <path d="M0 590 Q 320 520 640 570 T 1280 560 T 1600 585 V900 H0 Z" fill="#0d6250" opacity="0.7"/>

  <!-- mar -->
  <rect y="600" width="1600" height="300" fill="url(#sea)"/>
  <g stroke="#2a9a7f" stroke-width="3" opacity="0.35" fill="none">
    <path d="M120 680 q 40 -12 80 0 t 80 0"/>
    <path d="M420 720 q 40 -12 80 0 t 80 0"/>
    <path d="M900 700 q 40 -12 80 0 t 80 0"/>
    <path d="M1180 740 q 40 -12 80 0 t 80 0"/>
  </g>

  <!-- islote de Gaztelugatxe con ermita y puente en zigzag -->
  <g transform="translate(1000 470)">
    <path d="M0 150 C 20 60 90 20 160 30 C 210 38 250 90 250 150 Z" fill="#0a4034"/>
    <path d="M60 150 C 70 96 120 70 160 78 C 195 86 210 118 210 150 Z" fill="#0c4c3d"/>
    <!-- ermita -->
    <rect x="150" y="46" width="26" height="20" fill="#f4efe6"/>
    <polygon points="150,46 163,32 176,46" fill="#c9a24b"/>
    <rect x="161" y="24" width="3" height="10" fill="#c9a24b"/>
    <!-- puente zigzag -->
    <path d="M-10 190 L 40 170 L 70 178 L 110 150 L 150 150" fill="none" stroke="#e9d9a8" stroke-width="4" stroke-linejoin="round" opacity="0.85"/>
  </g>

  <!-- acantilado en primer plano -->
  <path d="M0 640 C 120 600 240 640 320 720 C 360 760 380 830 360 900 H0 Z" fill="#083127"/>
</svg>
